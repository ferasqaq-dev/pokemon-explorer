<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Pokémon Explorer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes pokeball-bounce {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-15px) scale(1.1);
        }
      }

      @keyframes float-particles {
        0% {
          transform: translateY(0px);
          opacity: 0.2;
        }
        50% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-25px);
          opacity: 0;
        }
      }

      @keyframes glow-pulse {
        0%,
        100% {
          box-shadow:
            0 0 20px rgba(76, 175, 80, 0.3),
            0 30px 60px rgba(255, 152, 0, 0.15);
        }
        50% {
          box-shadow:
            0 0 30px rgba(76, 175, 80, 0.5),
            0 30px 80px rgba(255, 152, 0, 0.25);
        }
      }

      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #1b5e20 0%,
          #f57f17 25%,
          #0d47a1 50%,
          #f57f17 75%,
          #1b5e20 100%
        );
        background-size: 400% 400%;
        font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 1rem;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(76, 175, 80, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
        top: -50px;
        left: -50px;
        animation: float-particles 6s ease-in-out infinite;
      }

      body::after {
        content: "";
        position: absolute;
        width: 150px;
        height: 150px;
        background: radial-gradient(
          circle,
          rgba(255, 152, 0, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
        bottom: 10%;
        right: 5%;
        animation: float-particles 8s ease-in-out infinite 1s;
      }

      .auth-container {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 10;
        animation: slide-in 0.6s ease-out;
      }

      .pokeball-icon {
        font-size: 3.5rem;
        background: linear-gradient(135deg, #4caf50, #ffc107);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
        animation: pokeball-bounce 2s ease-in-out infinite;
        text-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
      }

      .auth-card {
        background: linear-gradient(
          135deg,
          rgba(27, 94, 32, 0.95) 0%,
          rgba(245, 127, 23, 0.05) 100%
        );
        border: 2px solid rgba(76, 175, 80, 0.3);
        border-radius: 24px;
        box-shadow:
          0 0 40px rgba(76, 175, 80, 0.2),
          0 20px 60px rgba(255, 152, 0, 0.1);
        padding: 2.8rem;
        backdrop-filter: blur(10px);
        animation: glow-pulse 3s ease-in-out infinite;
        position: relative;
      }

      .auth-card::before {
        content: "";
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(135deg, #4caf50, #0d47a1, #ffc107, #4caf50);
        border-radius: 24px;
        opacity: 0;
        z-index: -1;
        animation: glow-pulse 3s ease-in-out infinite;
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-header h2 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ffc107, #0d47a1, #4caf50);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .auth-header p {
        color: #c8e6c9;
        margin: 0;
        font-size: 0.95rem;
        font-weight: 500;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        color: #fff;
        font-weight: 700;
        margin-bottom: 0.6rem;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(76, 175, 80, 0.3);
        border-radius: 12px;
        padding: 0.9rem 1.1rem;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #4caf50;
        box-shadow:
          0 0 20px rgba(76, 175, 80, 0.4),
          inset 0 0 20px rgba(76, 175, 80, 0.05);
        outline: none;
      }

      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .helptext {
        display: none !important;
      }

      .errorlist {
        list-style: none;
        padding: 0.75rem;
        margin: 0.5rem 0 0 0;
        background: rgba(244, 67, 54, 0.1);
        border-left: 3px solid #ff6f00;
        border-radius: 6px;
      }

      .errorlist li {
        color: #ffccbc;
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
        font-weight: 500;
      }

      .btn-register {
        width: 100%;
        background: linear-gradient(
          135deg,
          #4caf50 0%,
          #0d47a1 50%,
          #ffc107 100%
        );
        border: none;
        color: #1b5e20;
        font-weight: 700;
        padding: 1.1rem;
        border-radius: 12px;
        margin-top: 1.8rem;
        box-shadow:
          0 8px 25px rgba(76, 175, 80, 0.3),
          0 4px 12px rgba(255, 152, 0, 0.2);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        cursor: pointer;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        position: relative;
        overflow: hidden;
      }

      .btn-register::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .btn-register:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow:
          0 12px 35px rgba(76, 175, 80, 0.4),
          0 6px 16px rgba(255, 152, 0, 0.3);
      }

      .btn-register:hover::before {
        width: 300px;
        height: 300px;
      }

      .btn-register:active {
        transform: translateY(-2px) scale(0.98);
      }

      .auth-footer {
        text-align: center;
        margin-top: 1.8rem;
        color: #a5d6a7;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .auth-footer a {
        color: #ffc107;
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
        position: relative;
      }

      .auth-footer a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background: #ffc107;
        transition: width 0.3s ease;
      }

      .auth-footer a:hover::after {
        width: 100%;
      }

      @media (max-width: 479.98px) {
        .auth-card {
          padding: 2rem;
        }
        .pokeball-icon {
          font-size: 2.5rem;
        }
        .auth-header h2 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="pokeball-icon">
            <i class="fa-solid fa-circle"></i>
          </div>
          <h2>New Trainer</h2>
          <p>Begin your Pokémon collecting journey</p>
        </div>
        <form method="POST">
          {% csrf_token %} {% for field in form %}
          <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }} {% if field.errors %}
            <div class="errorlist">
              {% for error in field.errors %}
              <li>{{ error }}</li>
              {% endfor %}
            </div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-register">
            <i class="fa-solid fa-star me-2"></i> Become A Trainer
          </button>
        </form>
        <div class="auth-footer">
          Already a trainer? <a href="{% url 'login' %}">Log in</a>
        </div>
      </div>
    </div>
  </body>
</html>
