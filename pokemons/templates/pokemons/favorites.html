{% extends 'base.html' %} {% block content %}
<h2 style="margin-bottom: 24px">Your Favorite Pokémon ❤️</h2>

<div class="grid">
  {% for p in pokemons %}
  <div class="card">
    <img src="{{ p.image }}" alt="{{ p.name }}" />
    <h3>{{ p.name }}</h3>
    <div
      style="margin-top: 16px; display: flex; gap: 8px; justify-content: center"
    >
      <a
        href="{% url 'pokemon_detail' p.id %}"
        class="btn"
        style="font-size: 13px; padding: 8px 16px"
        >View Details</a
      >
      <a
        href="{% url 'toggle_favorite' p.id %}"
        class="btn"
        style="
          background-color: #fee2e2;
          color: var(--danger);
          font-size: 13px;
          padding: 8px 16px;
        "
        >❤️</a
      >
    </div>
  </div>
  {% empty %}
  <p
    style="
      color: var(--text-muted);
      grid-column: 1/-1;
      text-align: center;
      padding: 40px;
    "
  >
    You haven't added any favorites yet.
  </p>
  {% endfor %}
</div>
{% endblock %}
