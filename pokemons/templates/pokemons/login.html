<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Pokémon Explorer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes fade-in-scale {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      @keyframes glow-shimmer {
        0% {
          box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
        50% {
          box-shadow: 0 0 40px rgba(6, 182, 212, 0.4);
        }
        100% {
          box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
      }

      :root {
        --primary: #0f172a;
        --primary-light: #1e293b;
        --accent: #06b6d4;
        --accent-light: #22d3ee;
        --gold: #f59e0b;
        --text: #f1f5f9;
        --text-muted: #cbd5e1;
      }

      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          #1a2e4a 50%,
          #0f4c75 100%
        );
        font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 1rem;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.1),
          transparent
        );
        border-radius: 50%;
        top: -100px;
        right: -100px;
        animation: float 6s ease-in-out infinite;
      }

      body::after {
        content: "";
        position: absolute;
        width: 250px;
        height: 250px;
        background: radial-gradient(
          circle,
          rgba(245, 158, 11, 0.08),
          transparent
        );
        border-radius: 50%;
        bottom: -80px;
        left: -80px;
        animation: float 8s ease-in-out infinite 1s;
      }

      .auth-container {
        width: 100%;
        max-width: 450px;
        position: relative;
        z-index: 10;
        animation: fade-in-scale 0.6s ease-out;
      }

      .auth-card {
        background: rgba(30, 41, 59, 0.5);
        border: 2px solid rgba(6, 182, 212, 0.2);
        border-radius: 20px;
        box-shadow:
          0 25px 60px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        padding: 3rem;
        backdrop-filter: blur(20px);
        animation: glow-shimmer 4s ease-in-out infinite;
        transition: all 0.3s ease;
      }

      .auth-card:hover {
        border-color: rgba(6, 182, 212, 0.4);
        background: rgba(30, 41, 59, 0.6);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .auth-header h2 {
        font-size: 2.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.8rem;
        letter-spacing: -0.02em;
      }

      .auth-header p {
        color: var(--text-muted);
        margin: 0;
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        color: var(--text);
        font-weight: 700;
        margin-bottom: 0.7rem;
        font-size: 0.9rem;
        letter-spacing: 0.05em;
      }

      .form-control {
        background: rgba(15, 23, 42, 0.4);
        border: 2px solid rgba(6, 182, 212, 0.15);
        border-radius: 12px;
        padding: 1rem 1.2rem;
        color: var(--text);
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        background: rgba(15, 23, 42, 0.7);
        border-color: var(--accent);
        box-shadow:
          0 0 20px rgba(6, 182, 212, 0.25),
          inset 0 0 10px rgba(6, 182, 212, 0.05);
      }

      .form-control::placeholder {
        color: rgba(203, 213, 225, 0.4);
      }

      .helptext {
        display: none !important;
      }

      .errorlist {
        list-style: none;
        padding: 0.9rem;
        margin: 0.7rem 0 0 0;
        background: rgba(239, 68, 68, 0.1);
        border-left: 4px solid var(--error);
        border-radius: 8px;
        animation: fade-in-scale 0.3s ease-out;
      }

      .errorlist li {
        color: #fca5a5;
        font-size: 0.85rem;
        margin-bottom: 0.3rem;
        font-weight: 500;
      }

      .btn-login {
        width: 100%;
        background: linear-gradient(135deg, var(--accent), #0891b2);
        border: none;
        color: var(--primary);
        font-weight: 700;
        padding: 1.1rem;
        border-radius: 12px;
        margin-top: 2rem;
        box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        cursor: pointer;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .btn-login:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 40px rgba(6, 182, 212, 0.4);
      }

      .btn-login:active {
        transform: translateY(-2px);
      }

      .auth-footer {
        text-align: center;
        margin-top: 2rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .auth-footer a {
        color: var(--accent-light);
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
        position: relative;
      }

      .auth-footer a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background: var(--accent-light);
        transition: width 0.3s ease;
      }

      .auth-footer a:hover::after {
        width: 100%;
      }

      @media (max-width: 479.98px) {
        .auth-card {
          padding: 2rem;
        }
        .auth-header h2 {
          font-size: 1.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your Pokémon Explorer account</p>
        </div>
        <form method="POST">
          {% csrf_token %} {% for field in form %}
          <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }} {% if field.errors %}
            <div class="errorlist">
              {% for error in field.errors %}
              <li>{{ error }}</li>
              {% endfor %}
            </div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-login">
            <i class="fa-solid fa-sign-in-alt me-2"></i> Sign In
          </button>
        </form>
        <div class="auth-footer">
          Don't have an account?
          <a href="{% url 'register' %}">Create one now</a>
        </div>
      </div>
    </div>
  </body>
</html>
