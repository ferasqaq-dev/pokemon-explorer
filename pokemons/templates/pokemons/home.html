<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéExplorer - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .navbar {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      }
      .poke-card {
        border: none;
        border-radius: 15px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        background: #ffffff;
        overflow: hidden;
      }
      .poke-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
      }
      .img-container {
        background-color: #f1f3f5;
        border-bottom-left-radius: 50%;
        border-bottom-right-radius: 50%;
        padding: 20px;
        text-align: center;
      }
      .search-bar {
        border-radius: 30px;
        padding-left: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        border: 1px solid #ced4da;
      }
      .search-btn {
        border-radius: 30px;
        padding: 0 25px;
        background: #2a5298;
        color: white;
      }
      .search-btn:hover {
        background: #1e3c72;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="{% url 'home' %}"
          ><i class="text-warning fa-solid fa-bolt me-2"></i>PokéExplorer</a
        >
        <div class="ms-auto d-flex align-items-center">
          {% if user.is_authenticated %}
          <span class="text-white-50 me-3"
            ><i class="fa-solid fa-user me-1"></i> Hello,
            <strong class="text-white">{{ user.username }}</strong></span
          >
          <a
            href="{% url 'logout' %}"
            class="btn btn-sm btn-outline-light px-3 rounded-pill"
            >Logout</a
          >
          {% else %}
          <a
            href="{% url 'login' %}"
            class="btn btn-sm btn-outline-light me-2 px-3 rounded-pill"
            >Login</a
          >
          <a
            href="{% url 'register' %}"
            class="btn btn-sm btn-warning text-dark px-3 rounded-pill fw-bold"
            >Register</a
          >
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="row justify-content-center mb-5">
        <div class="col-md-6">
          <form method="GET" action="{% url 'home' %}" class="d-flex gap-2">
            <input
              type="text"
              name="search"
              class="form-control search-bar"
              placeholder="Search Pokémon by name..."
              value="{{ query_name }}"
            />
            <button type="submit" class="btn search-btn fw-bold">Search</button>
          </form>
          {% if query_name %}
          <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="text-decoration-none text-muted"
              ><i class="fa-solid fa-rotate-left"></i> Clear Search</a
            >
          </div>
          {% endif %}
        </div>
      </div>

      <div id="main-content-container">
        {% include 'pokemons/pokemon_list_partial.html' %}
      </div>
    </div>

    <script>
      const container = document.getElementById("main-content-container");

      function initAppEvents() {
        document.querySelectorAll(".fav-btn").forEach((button) => {
          button.onclick = function (event) {
            event.preventDefault();
            const url = this.getAttribute("href");
            const btn = this;

            fetch(url)
              .then((response) => response.json())
              .then((data) => {
                if (data.status === "success") {
                  if (data.action === "added") {
                    btn.className =
                      "btn btn-danger btn-sm w-100 fav-btn py-2 rounded-pill";
                    btn.innerHTML =
                      '<i class="fa-solid fa-heart me-1"></i> Remove Favorite';
                  } else if (data.action === "removed") {
                    btn.className =
                      "btn btn-outline-danger btn-sm w-100 fav-btn py-2 rounded-pill";
                    btn.innerHTML =
                      '<i class="fa-regular fa-heart me-1"></i> Add Favorite';
                  }
                }
              })
              .catch((err) => console.error(err));
          };
        });

        document.querySelectorAll(".page-link-ajax").forEach((link) => {
          link.onclick = function (event) {
            event.preventDefault();
            const url = this.getAttribute("href");

            fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } })
              .then((response) => response.text())
              .then((html) => {
                container.innerHTML = html;
                window.scrollTo({ top: 0, behavior: "smooth" });
                initAppEvents();
              })
              .catch((err) => console.error(err));
          };
        });
      }

      initAppEvents();
    </script>
  </body>
</html>
