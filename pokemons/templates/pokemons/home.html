<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Explorer 🦖</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <h1 class="text-center mb-5 fw-bold text-primary">
        🦖 Pokémon Explorer 🦖
      </h1>

      <div class="row g-4">
        {% for pokemon in pokemons %}
        <div class="col-md-3 col-sm-6">
          <div class="card h-100 text-center shadow-sm border-0">
            <img
              src="{{ pokemon.image }}"
              class="card-img-top bg-dark-subtle p-3"
              alt="{{ pokemon.name }}"
            />
            <div class="card-body">
              <span class="badge bg-secondary mb-2">#{{ pokemon.id }}</span>
              <h5 class="card-title fw-bold">{{ pokemon.name }}</h5>
              <a
                href="{% url 'pokemon_detail' pokemon.id %}"
                class="btn btn-primary btn-sm w-100 mt-2"
                >View Details</a
              >
            </div>
          </div>
        </div>
        {% empty %}
        <p class="text-center">No Pokémon found.</p>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
