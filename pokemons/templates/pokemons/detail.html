{% extends "base.html" %} {% block content %}
<div
  class="card"
  style="
    max-width: 500px;
    margin: 40px auto;
    padding: 40px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
  "
>
  <img
    src="{{ image }}"
    alt="{{ name }}"
    style="
      width: 180px;
      height: 180px;
      margin: 0 auto 24px auto;
      display: block;
    "
  />
  <h2 style="font-size: 28px; margin: 0 0 16px 0; font-weight: 700">
    {{ name }}
  </h2>

  <div
    style="
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    "
  >
    <span
      style="
        background: #e0e7ff;
        color: var(--primary);
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
      "
      >Type: {{ types }}</span
    >
    <span
      style="
        background: #f1f5f9;
        color: var(--text-muted);
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
      "
      >Ability: {{ abilities }}</span
    >
  </div>

  <div
    style="
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      padding: 20px 0;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-around;
    "
  >
    <div>
      <p
        style="
          margin: 0;
          color: var(--text-muted);
          font-size: 12px;
          text-transform: uppercase;
          font-weight: 500;
        "
      >
        Height
      </p>
      <p style="margin: 4px 0 0 0; font-weight: 700; font-size: 20px">
        {{ height }} dm
      </p>
    </div>
    <div>
      <p
        style="
          margin: 0;
          color: var(--text-muted);
          font-size: 12px;
          text-transform: uppercase;
          font-weight: 500;
        "
      >
        Weight
      </p>
      <p style="margin: 4px 0 0 0; font-weight: 700; font-size: 20px">
        {{ weight }} dg
      </p>
    </div>
  </div>

  <div style="display: flex; gap: 12px; justify-content: center">
    <a href="{% url 'home' %}" class="btn btn-secondary" style="flex: 1"
      >← Back</a
    >
    {% if user.is_authenticated %}
    <a
      href="{% url 'toggle_favorite' id %}"
      class="btn"
      style="flex: 1; background-color: {% if is_favorite %}var(--danger){% else %}var(--success){% endif %};"
    >
      {% if is_favorite %}❤️ Unfavorite{% else %}🤍 Favorite{% endif %}
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
